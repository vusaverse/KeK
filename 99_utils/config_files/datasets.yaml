  resultaten:
    metadata:
      description: "Resultaten wordt aangeleverd door functioneel beheer. Zij zetten de data klaar van uit een SAP4HANA database en wordt opgepakt door het Cloud team die door middel van een script het bestand bij ons op de SFTP server plaatsen. In principe zijn dit per levering 2 bestanden; 1 van het vorige collegejaar (totaal) en 1 van het huidige collegejaar (cumulatief tot aanleverdatum)"
      source: "SAP SLM sftp server"
      update_frequency: "weekly"
    paths:
      file_pattern: "MODBOOK_"
    naming:
      dataset_name: "Resultaten"
      prefix: "SAP_"
    etl_script:
      repo_path: "01_ETL/Resultaten.R"

  sap_opleidingen:
    metadata:
      description: "Opleidingen data from SAP"
      source: "MIVUftp server"
      update_frequency: "monthly"
