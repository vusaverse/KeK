# Collection of keys targeting client secrets in Azure Key Vault
secrets:
  metadata:
    key_vault_url: "https://pilotfabric.vault.azure.net/"

  azure:
    sas_token: "SASTOKEN"
    server_name: "SERVERNAME"

  canvas:
    canvas_api_key: "CANVAS-API-KEY"
    canvas_base_url: "CANVAS-BASE-URL"

  kek:
    kek_client_id: "KEK-CLIENT-ID"
    kek_client_secret: "KEK-CLIENT-SECRET"
    kek_tenant_id: "KEK-TENANT-ID"

  slack:
    slack_bot: "SLACK-BOT"
    slack_token: "SLACK-TOKEN"
    slack_webhook: "SLACK-WEBHOOK"

  studiekeuzedatabase:
    skd_api_url: "SKD-API-URL"
    skd_client_id: "SKD-CLIENT-ID"
    skd_key: "SKDB-KEY"
    skd_token_url: "SKD-TOKEN-URL"

  termtime:
    termtime_base_url: "TERMTIME-BASE-URL"
    termtime_key: "TERMTIME-KEY"
    termtime_key_2019: "TERMTIME-KEY-1920"
    termtime_key_2020: "TERMTIME-KEY-2021"
    termtime_key_2021: "TERMTIME-KEY-2122"
    termtime_key_2022: "TERMTIME-KEY-2223"
    termtime_key_2023: "TERMTIME-KEY-2324"
    termtime_key_2024: "TERMTIME-KEY-2425"
    termtime_key_2025: "TERMTIME-KEY-2526"

  uas:
    uas_acc_client_id: "UAS-ACC-CLIENT-ID"
    uas_acc_client_secret: "UAS-ACC-CLIENT-SECRET"
    uas_prod_client_id: "UAS-PROD-CLIENT-ID"
    uas_prod_client_secret: "UAS-PROD-CLIENT-SECRET"
