# datasets.yaml
# Contains only the datasets section from config.yaml

datasets:
  aanmeldingen:
    metadata:
      description: "Student enrollment data from VUDATA"
      source: "MIVU SFTP VU BI"
      update_frequency: "daily"
    paths:
      file_pattern: "ODW202 - VUanalytics Aanmeldingen"
    naming:
      dataset_name: "AAN_Aanmeldingen_VUDATA"
      prefix: "ODW_"
    etl_script:
      repo_path: "01_ETL/Aanmeldingen_VUDATA.R"

  bsa:
    metadata:
      description: "BSA data from SAP-SLM"
      source: "SAP SLM sftp server"
      update_frequency: "monthly"
    paths:
      file_pattern: "BSA"
    naming:
      dataset_name: "BSA"
      prefix: "SAP_"
    etl_script:
      repo_path: "01_ETL/BSA.R"

  canvas_lms:
    metadata:
      description: "Course and user activity data from Canvas LMS"
      source: "Canvas LMS API"
      update_frequency: "daily"
    paths:
      file_pattern: "Canvas"
    naming:
      dataset_name: "Canvas_LMS"
      prefix: "CAN_"
    etl_script:
      repo_path: "01_ETL/Canvas.R"

  cbs_croho:
    metadata:
      description: "CBS CROHO classification data - Central Register of Higher Education"
      source: "CBS Excel export"
      update_frequency: "yearly"
    paths:
      file_pattern: "crohocode"
    naming:
      dataset_name: "CBS_CROHO"
      prefix: "CBS_"
    etl_script:
      repo_path: "01_ETL/CBS_CROHO.R"

  cohorten_sap:
    metadata:
      description: "Cohorten data from SAP"
      source: "MIVU sftp server"
      update_frequency: "yearly"
    paths:
      file_pattern: "ODW204"
      column_mapping: "doc/column_mapping/cohorten_sap.csv"
    naming:
      dataset_name: "Cohorten_SAP"
      prefix: "ODW_"
    etl_script:
      repo_path: "01_ETL/Cohorten_SAP.R"

  cohorten_unl:
    metadata:
      description: "UNL Cohorten data for student analytics"
      source: "MIVU 1cHO UNL"
      update_frequency: "yearly"
    paths:
      column_mapping: "doc/column_mapping/cohorten_unl.csv"
      file_pattern: "EOIcohort_UNL"
    naming:
      dataset_name: "INS_Cohorten_UNL"
      prefix: "UNL_"
    etl_script:
      repo_path: "01_ETL/Cohorten_UNL.R"

  duo_bekostiging:
    metadata:
      description: "DUO bekostiging data"
      source: "DUO"
      update_frequency: "yearly"
    paths:
      file_pattern: "bekost_([0-9]{4})definitief.csv"
    naming:
      dataset_name: "DUO_Bekostiging"
      prefix: "DUO_"
    etl_script:
      repo_path: "01_ETL/DUO_Bekostiging.R"

  duo_instellingsprognose:
    metadata:
      description: "Instellingsprognose based on referentieramingen"
      source: "DUO"
      update_frequency: "yearly"
    paths:
      file_pattern: "studentenprognoses-([0-9]{4}).xlsx"
    naming:
      dataset_name: "DUO_Instellingsprognose"
      prefix: "DUO_"
    etl_script:
      repo_path: "01_ETL/DUO_Instellingsprognose.R"

  evalytics:
    metadata:
      description: "Course evaluation data from Evalytics system"
      source: "VU-SFTP server evalytics/"
      update_frequency: "weekly"
      has_download_stage: true
    paths:
      file_pattern: "Evalytics"
      column_mapping: "doc/column_mapping/evalytics_evaluation.csv"
    naming:
      dataset_name: "EVA_Evalytics"
      prefix: "EVA_"
    etl_script:
      repo_path: "01_ETL/Evalytics.R"

  functiebeperking_sap:
    metadata:
      description: "Student functional limitation/disability data from SAP"
      source: "SAP SLM SFTP server"
      update_frequency: "monthly"
    paths:
      file_pattern: "Functiebeperking"
    naming:
      dataset_name: "DIS_Functiebeperking_SAP"
      prefix: "SAP_"
    etl_script:
      repo_path: "01_ETL/Functiebeperking_SAP.R"

  geslaagden_unl:
    metadata:
      description: "Graduate cohort data from UNL (Universities of the Netherlands)"
      source: "1cHO cohort files"
      update_frequency: "yearly"
    paths:
      column_mapping: "doc/column_mapping/geslaagden_unl.csv"
      file_pattern: "Gediplomeerdencohort_UNL"
    naming:
      dataset_name: "INS_Geslaagden_UNL"
      prefix: "UNL_"
    etl_script:
      repo_path: "01_ETL/Geslaagden_UNL.R"

  inschrijvingen_1cho:
    metadata:
      description: "Student enrollment data from 1cHO"
      source: "MIVU SFTP VU BI"
      update_frequency: "yearly"
    paths:
      file_pattern: "ODW205"
      column_mapping: "doc/column_mapping/inschrijvingen_1cho.csv"
    naming:
      dataset_name: "INS_Inschrijvingen_1CHO"
      prefix: "ODW_"
    etl_script:
      repo_path: "01_ETL/Inschrijvingen_1cHO.R"

  inschrijvingen_sap:
    metadata:
      description: "Student enrollment data from SAP"
      source: "MIVU SFTP VU BI"
      update_frequency: "daily"
    paths:
      file_pattern: "ODW203 - VUanalytics Inschrijvingen"
    naming:
      dataset_name: "INS_Inschrijvingen_SAP"
      prefix: "ODW_"
    etl_script:
      repo_path: "01_ETL/Inschrijvingen_SAP.R"

  nae:
    metadata:
      description: "Nationale Alumni Enquête (NAE)"
      source: "Centerdata"
      update_frequency: "bi-yearly"
    paths:
      file_pattern: "NAE"
    naming:
      dataset_name: "NAE"
      prefix: "NAE_"
    etl_script:
      repo_path: "01_ETL/NAE.R"

  nse:
    metadata:
      description: "Nationale Studenten Enquête (NSE)"
